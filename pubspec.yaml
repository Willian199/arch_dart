name: arch_dart
description: >-
  Architectural testing framework for Dart and Flutter inspired by ArchUnit.
  Enforce naming conventions, layer dependencies, clean architecture and more.
version: 1.0.0
repository: https://github.com/evandersondev/arch_dart
homepage: https://github.com/evandersondev/arch_dart
issue_tracker: https://github.com/evandersondev/arch_dart/issues
funding:
  - https://buymeacoffee.com/evandersondev
license: MIT

topics:
  - architecture
  - testing
  - archunit
  - clean-architecture
  - static-analysis

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  analyzer: '>=8.0.0 <14.0.0'
  path: ^1.9.0
  yaml: ^3.1.3

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0
